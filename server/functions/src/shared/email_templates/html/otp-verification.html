{{> header}}
                      <p style="margin:0 0 8px;font-family:'Figtree',Arial,sans-serif;font-size:15px;font-weight:400;color:#2F4B4F;line-height:24px;">
                        Hey <strong>{{userName}}</strong>,
                      </p>
                      <p style="margin:0 0 12px;font-family:'Figtree',Arial,sans-serif;font-size:24px;font-weight:700;color:#102A2D;line-height:32px;">
                        Your OTP code
                      </p>
                      <p style="margin:0 0 24px;font-family:'Figtree',Arial,sans-serif;font-size:15px;color:#2F4B4F;line-height:24px;">
                        Use this code to finish signing in to Piya.
                      </p>
                      <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#F4FAFA;border:1px solid #D8E6E7;border-radius:8px;margin-bottom:24px;">
                        <tr>
                          <td align="center" style="padding:24px 20px;">
                            <p style="margin:0;font-family:'Figtree',Arial,sans-serif;font-size:36px;font-weight:700;color:#102A2D;letter-spacing:8px;line-height:44px;">
                              {{otpCode}}
                            </p>
                          </td>
                        </tr>
                      </table>
                      <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#FAFAE1;border-radius:8px;margin-bottom:24px;">
                        <tr>
                          <td style="padding:14px 16px;">
                            <p style="margin:0;font-family:'Figtree',Arial,sans-serif;font-size:14px;color:#2F4B4F;line-height:22px;">
                              Expires in <strong style="color:#102A2D;">{{expiresIn}} minutes</strong>. If this was not you, ignore it.
                            </p>
                          </td>
                        </tr>
                      </table>
{{> footer}}
