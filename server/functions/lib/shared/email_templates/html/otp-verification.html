{{> header}}
                      <p style="margin:0 0 8px;font-family:'Inter',Arial,sans-serif;font-size:16px;font-weight:400;color:#344054;line-height:24px;">
                        Hey <strong>{{userName}}</strong>,
                      </p>
                      <p style="margin:0 0 24px;font-family:'Inter',Arial,sans-serif;font-size:24px;font-weight:600;color:#232233;line-height:32px;">
                        Your verification code
                      </p>
                      <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="margin-bottom:24px;">
                        <tr>
                          <td style="height:1px;background-color:#C4C4C4;"></td>
                        </tr>
                      </table>
                      <p style="margin:0 0 16px;font-family:'Inter',Arial,sans-serif;font-size:15px;color:#667085;line-height:24px;">
                        Use the code below to verify your account:
                      </p>
                      <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#F8F7F7;border-radius:14px;padding:24px;margin-bottom:24px;">
                        <tr>
                          <td align="center">
                            <p style="margin:0;font-family:'Inter',Arial,sans-serif;font-size:36px;font-weight:700;color:#232233;letter-spacing:8px;line-height:44px;">
                              {{otpCode}}
                            </p>
                          </td>
                        </tr>
                      </table>
                      <p style="margin:0 0 16px;font-family:'Inter',Arial,sans-serif;font-size:15px;color:#667085;line-height:24px;">
                        This code will expire in <strong style="color:#344054;">{{expiresIn}} minutes</strong>.
                      </p>
                      <p style="margin:0 0 32px;font-family:'Inter',Arial,sans-serif;font-size:15px;color:#667085;line-height:24px;">
                        If you didn't request this code, please ignore this email.
                      </p>
{{> footer}}
