{{> header}}
                      <p style="margin:0 0 8px;font-family:'Figtree',Arial,sans-serif;font-size:15px;font-weight:400;color:#2F4B4F;line-height:24px;">
                        You have been invited to join
                      </p>
                      <p style="margin:0 0 12px;font-family:'Figtree',Arial,sans-serif;font-size:24px;font-weight:700;color:#102A2D;line-height:32px;">
                        {{businessName}}
                      </p>
                      <p style="margin:0 0 24px;font-family:'Figtree',Arial,sans-serif;font-size:15px;color:#2F4B4F;line-height:24px;">
                        Accept the invitation to join the team as <strong>{{role}}</strong>.
                      </p>
                      {{> button url=acceptUrl text="Accept invitation"}}
                      <p style="margin:0 0 24px;font-family:'Figtree',Arial,sans-serif;font-size:14px;color:#2F4B4F;line-height:22px;">
                        This invitation expires in {{expiresInDays}} days. If you were not expecting it, you can ignore this email.
                      </p>
{{> footer}}
