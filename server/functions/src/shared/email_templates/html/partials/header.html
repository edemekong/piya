<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html dir="ltr" lang="en">
  <head>
    <meta content="width=device-width" name="viewport" />
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="telephone=no,address=no,email=no,date=no,url=no" name="format-detection" />
    <title>{{default title brand.name}}</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
      body { margin: 0; padding: 0; background-color: #F5F5F5; }
      @media only screen and (max-width: 620px) {
        .wrap { padding: 24px 16px !important; }
        .card { padding: 32px 24px !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background-color:#F5F5F5;">
    <div style="display:none;overflow:hidden;line-height:1px;opacity:0;max-height:0;max-width:0;">
      {{previewText}}
    </div>
    <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#F5F5F5;">
      <tr>
        <td align="center" class="wrap" style="padding:48px 24px;">
          <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width:560px;width:100%;">
            <tr>
              <td>
                <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation" class="card" style="background-color:#FFFFFF;border-radius:14px;padding:44px 44px 40px;">
                  <tr>
                    <td>
                      <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation">
                        <tr>
                          <td style="padding-bottom:36px;">
                            <img alt="{{brand.name}}" src="{{brand.logos.primary}}" height="48" style="display:block;width:auto;max-width:180px;height:48px;border:none;outline:none;border-radius:14px;" />
                          </td>
                        </tr>
                      </table>
