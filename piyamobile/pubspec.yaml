name: piyamobile
description: "Piya provides businesses with contact management, campaign and loyalty tooling, scheduled customer communications, and multi-channel conversation history."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0


dependencies:
  flutter:
    sdk: flutter

  # FIREBASE
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1

  # UI & ICONS
  cupertino_icons: ^1.0.8
  confetti: ^0.8.0
  auto_size_text: ^3.0.0
  fluttertoast: ^9.0.0
  flutter_svg: ^2.2.3
  shimmer: ^3.0.0
  gap: ^3.0.1
  extended_image: ^10.0.1
  pin_code_fields: ^8.0.1

  # STATE MANAGEMENT
  flutter_riverpod: ^3.1.0

  # NAVIGATION
  go_router: ^17.0.1

  # LOCALIZATION
  easy_localization: ^3.0.8
  easy_localization_loader: ^2.0.2
  intl: ^0.20.2

  # STORAGE
  shared_preferences: ^2.5.4
  path: ^1.9.0

  # NETWORK & API
  http: ^1.5.0
  internet_connection_checker_plus: ^3.0.0

  # MAP & LOCATION
  flutter_polyline_points: ^3.1.0
  location: ^8.0.1
  geolocator: ^14.0.2
  widget_to_marker: ^1.0.6
  google_maps_flutter: ^2.14.2

  # MEDIA & CAMERA
  camera: ^0.12.0+1
  video_player: ^2.10.1
  ffmpeg_kit_flutter_new: ^4.1.0
  file_picker: ^11.0.2
  video_thumbnail: ^0.5.6
  flutter_image_compress: ^2.4.0

  # UTILITIES
  flutter_dotenv: ^6.0.0
  package_info_plus: ^9.0.0
  device_info_plus: "12.3.0"
  random_string: ^2.3.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  flutter_timezone: ^5.0.1
  either_dart: ^1.0.0
  timezone: ^0.11.0

  # PERMISSIONS
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/svg/
    - assets/icons/
    - assets/jsons/
    - assets/translations.csv

  fonts:
    - family: Figtree
      fonts:
        - asset: assets/fonts/Figtree-Regular.ttf
        - asset: assets/fonts/Figtree-Medium.ttf
          weight: 500
        - asset: assets/fonts/Figtree-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Figtree-Bold.ttf
          weight: 700
        - asset: assets/fonts/Figtree-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Figtree-Black.ttf
          weight: 900